<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks | Yönetim ve Keşif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .admin-view, .customer-view, .login-view { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .book-card:hover { transform: translateY(-5px); transition: all 0.2s; }
    </style>
</head>
<body>

    <!-- ÜST MENÜ -->
    <nav class="bg-white border-b border-slate-200 fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showView('customer')">
            <i class="fa fa-book-bookmark text-blue-600 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">DGBOOKS</h1>
        </div>
        <div id="nav-btns">
            <button onclick="showView('login')" id="btn-to-admin" class="text-sm font-semibold text-slate-500 hover:text-blue-600 transition">Yönetici Girişi</button>
            <button onclick="logout()" id="btn-logout" class="hidden text-sm font-semibold text-red-500">Çıkış Yap</button>
        </div>
    </nav>

    <!-- 1. MÜŞTERİ EKRANI (DASHBOARD) -->
    <main id="customer-view" class="customer-view active pt-28 px-6 max-w-6xl mx-auto">
        <!-- Arama ve Karşılama -->
        <div class="text-center py-12">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Hangi kitabı aramıştınız?</h2>
            <div class="relative max-w-2xl mx-auto mb-6">
                <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="mainSearch" oninput="runSearch(this.value)" placeholder="Kitap adı, yazar veya raf kodu..." 
                    class="w-full pl-14 pr-6 py-4 rounded-2xl border border-slate-200 shadow-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg">
            </div>
            <div class="flex flex-wrap justify-center gap-3 text-sm text-slate-500">
                <span>Popüler:</span>
                <button onclick="quickSearch('Roman')" class="hover:text-blue-600 font-medium">#Roman</button>
                <button onclick="quickSearch('Tarih')" class="hover:text-blue-600 font-medium">#Tarih</button>
                <button onclick="quickSearch('A1A')" class="hover:text-blue-600 font-medium">#RafA1A</button>
            </div>
        </div>

        <!-- Dashboard (Varsayılan Görünüm) -->
        <div id="customer-dashboard" class="space-y-12 pb-20">
            <section>
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fa fa-star text-yellow-500"></i> Yeni Gelenler</h3>
                <div id="recent-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <!-- Son eklenen 4 kitap -->
                </div>
            </section>
        </div>

        <!-- Arama Sonuçları (Sadece arama yapınca görünür) -->
        <div id="search-results-area" class="hidden pb-20">
            <h3 class="text-xl font-bold mb-6 text-blue-600">Arama Sonuçları</h3>
            <div id="search-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <!-- Sonuçlar -->
            </div>
        </div>
    </main>

    <!-- 2. GİRİŞ EKRANI -->
    <div id="login-view" class="login-view pt-40 px-6 max-w-md mx-auto">
        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Admin Erişimi</h2>
            <input type="password" id="adminPin" placeholder="PIN Kodunu Girin" class="w-full p-4 border rounded-xl mb-4 text-center text-2xl tracking-widest outline-none focus:border-blue-500">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Sisteme Giriş Yap</button>
            <button onclick="showView('customer')" class="w-full mt-4 text-slate-400 text-sm">İptal Et</button>
        </div>
    </div>

    <!-- 3. ADMIN PANELİ (KONTROL MASASI) -->
    <div id="admin-view" class="admin-view pt-28 px-6 max-w-7xl mx-auto pb-20">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-black text-slate-900">Envanter Yönetimi</h2>
                <p class="text-slate-500">Kitap ekleyin, düzenleyin veya silin.</p>
            </div>
            <button onclick="openEditor()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition">+ Yeni Kitap Ekle</button>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 font-bold text-slate-600">Kitap Bilgisi</th>
                        <th class="p-4 font-bold text-slate-600 text-center">Raf</th>
                        <th class="p-4 font-bold text-slate-600">Fiyat</th>
                        <th class="p-4 font-bold text-slate-600 text-right">İşlemler</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Veriler buraya gelecek -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- EDİTÖR MODAL -->
    <div id="editor-modal" class="hidden fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-2xl font-bold">Kitap Detayı</h3>
                <button onclick="closeEditor()" class="text-2xl text-slate-400 hover:text-slate-900">&times;</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="fIsbn" placeholder="ISBN No" class="flex-1 p-3 border rounded-xl outline-none focus:border-blue-500">
                        <button onclick="lookupIsbn()" class="bg-slate-100 px-4 rounded-xl hover:bg-slate-200 transition">Bul</button>
                    </div>
                    <input type="text" id="fTitle" placeholder="Kitap Adı" class="w-full p-3 border rounded-xl">
                    <input type="text" id="fAuthor" placeholder="Yazar" class="w-full p-3 border rounded-xl">
                    <div class="flex gap-4">
                        <input type="text" id="fShelf" placeholder="Raf (A1A)" class="flex-1 p-3 border rounded-xl">
                        <input type="number" id="fPrice" placeholder="Fiyat" class="flex-1 p-3 border rounded-xl">
                    </div>
                    <select id="fCategory" class="w-full p-3 border rounded-xl bg-white">
                        <option value="Roman">Roman</option>
                        <option value="Tarih">Tarih</option>
                        <option value="Bilim">Bilim</option>
                        <option value="Klasik">Klasik</option>
                    </select>
                    <input type="hidden" id="fId">
                    <input type="hidden" id="fCover">
                    <button onclick="handleSave()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">Kaydet</button>
                </div>
                <div class="bg-slate-50 rounded-2xl flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-200">
                    <img id="fPrevImg" src="" class="max-h-[200px] rounded-lg shadow-md hidden mb-2">
                    <p id="fPrevText" class="text-slate-400 text-sm text-center">Kapak resmi Google'dan otomatik alınır.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASYON ---
        const SUPABASE_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI'; // <--- KEY'İ EKLEMEYİ UNUTMA
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let booksCache = [];

        // --- BAŞLATMA ---
        async function init() {
            const { data, error } = await sb.from('books_v2').select('*').order('created_at', { ascending: false });
            if (data) {
                booksCache = data;
                renderRecent();
            }
        }

        // --- GÖRÜNÜM YÖNETİMİ ---
        function showView(view) {
            document.querySelectorAll('main, .admin-view, .login-view').forEach(v => v.classList.remove('active'));
            document.getElementById(view + '-view').classList.add('active');
            
            if(view === 'admin') renderAdminTable();
        }

        function checkLogin() {
            if(document.getElementById('adminPin').value === "1234") {
                localStorage.setItem('dgAuth', 'true');
                document.getElementById('btn-to-admin').classList.add('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                showView('admin');
            } else { alert("Hatalı PIN!"); }
        }

        function logout() {
            localStorage.removeItem('dgAuth');
            location.reload();
        }

        // --- MÜŞTERİ FONKSİYONLARI ---
        function renderRecent() {
            const recent = booksCache.slice(0, 4);
            const grid = document.getElementById('recent-grid');
            grid.innerHTML = recent.map(b => bookCardTemplate(b)).join('');
        }

        function runSearch(val) {
            const dash = document.getElementById('customer-dashboard');
            const searchArea = document.getElementById('search-results-area');
            const grid = document.getElementById('search-grid');

            if(val.length > 1) {
                dash.classList.add('hidden');
                searchArea.classList.remove('hidden');
                const filtered = booksCache.filter(b => 
                    b.title.toLowerCase().includes(val.toLowerCase()) || 
                    b.author.toLowerCase().includes(val.toLowerCase()) ||
                    b.shelf_location.toLowerCase().includes(val.toLowerCase())
                );
                grid.innerHTML = filtered.map(b => bookCardTemplate(b)).join('');
            } else {
                dash.classList.remove('hidden');
                searchArea.classList.add('hidden');
            }
        }

        function quickSearch(val) {
            document.getElementById('mainSearch').value = val;
            runSearch(val);
        }

        function bookCardTemplate(b) {
            return `
                <div class="book-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 p-3">
                    <img src="${b.cover_url || 'https://via.placeholder.com/150x220?text=Dgbooks'}" class="w-full aspect-[2/3] object-cover rounded-xl mb-3">
                    <h4 class="font-bold text-sm truncate">${b.title}</h4>
                    <p class="text-xs text-slate-500 mb-2 truncate">${b.author}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">📍 ${b.shelf_location}</span>
                        <span class="text-sm font-bold">${b.price}₺</span>
                    </div>
                </div>
            `;
        }

        // --- ADMIN FONKSİYONLARI ---
        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = booksCache.map(b => `
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="p-4 flex items-center gap-4">
                        <img src="${b.cover_url}" class="w-10 h-14 object-cover rounded shadow-sm">
                        <div>
                            <div class="font-bold text-slate-800">${b.title}</div>
                            <div class="text-xs text-slate-400">${b.author}</div>
                        </div>
                    </td>
                    <td class="p-4 text-center font-mono font-bold text-blue-600">${b.shelf_location}</td>
                    <td class="p-4 font-bold">${b.price}₺</td>
                    <td class="p-4 text-right">
                        <button onclick='openEditor(${JSON.stringify(b).replace(/'/g, "&#39;")})' class="p-2 text-slate-400 hover:text-blue-600"><i class="fa fa-edit"></i></button>
                        <button onclick='handleDelete("${b.id}")' class="p-2 text-slate-400 hover:text-red-500"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function openEditor(b = null) {
            document.getElementById('editor-modal').classList.remove('hidden');
            if(b) {
                document.getElementById('modal-title').innerText = "Kitabı Düzenle";
                document.getElementById('fId').value = b.id;
                document.getElementById('fTitle').value = b.title;
                document.getElementById('fAuthor').value = b.author;
                document.getElementById('fIsbn').value = b.isbn || "";
                document.getElementById('fShelf').value = b.shelf_location;
                document.getElementById('fPrice').value = b.price;
                document.getElementById('fCategory').value = b.category || "Roman";
                document.getElementById('fCover').value = b.cover_url;
                updatePreview(b.cover_url);
            } else {
                document.getElementById('modal-title').innerText = "Yeni Kitap";
                document.getElementById('fId').value = "";
                document.querySelectorAll('#editor-modal input').forEach(i => i.value = "");
                updatePreview("");
            }
        }

        function closeEditor() { document.getElementById('editor-modal').classList.add('hidden'); }

        async function lookupIsbn() {
            const isbn = document.getElementById('fIsbn').value;
            if(!isbn) return;
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await res.json();
            if(data.items) {
                const info = data.items[0].volumeInfo;
                document.getElementById('fTitle').value = info.title;
                document.getElementById('fAuthor').value = info.authors ? info.authors[0] : '';
                const cover = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : '';
                document.getElementById('fCover').value = cover;
                updatePreview(cover);
                document.getElementById('fShelf').value = info.title[0].toUpperCase() + "1A";
            }
        }

        function updatePreview(url) {
            const img = document.getElementById('fPrevImg');
            const txt = document.getElementById('fPrevText');
            if(url) { img.src = url; img.classList.remove('hidden'); txt.classList.add('hidden'); }
            else { img.classList.add('hidden'); txt.classList.remove('hidden'); }
        }

        async function handleSave() {
            const payload = {
                title: document.getElementById('fTitle').value,
                author: document.getElementById('fAuthor').value,
                isbn: document.getElementById('fIsbn').value,
                shelf_location: document.getElementById('fShelf').value,
                price: parseFloat(document.getElementById('fPrice').value) || 0,
                category: document.getElementById('fCategory').value,
                cover_url: document.getElementById('fCover').value
            };
            const id = document.getElementById('fId').value;
            const { error } = id ? await sb.from('books_v2').update(payload).eq('id', id) : await sb.from('books_v2').insert([payload]);
            
            if(!error) { alert("Başarılı!"); location.reload(); }
            else { alert("Hata: " + error.message); }
        }

        async function handleDelete(id) {
            if(confirm("Emin misiniz?")) {
                await sb.from('books_v2').delete().eq('id', id);
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
