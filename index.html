<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks | Future of Bookstores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: radial-gradient(circle at top right, #3b82f6, #1e1b4b); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .book-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .book-card:hover { transform: translateY(-10px) rotate(2deg); }
        .category-pill:hover { background: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- HERO SECTION -->
    <header class="hero-gradient min-h-[60vh] flex flex-col items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-7xl">
            <h1 class="text-3xl font-extrabold tracking-tighter text-white">DG<span class="text-blue-400">BOOKS</span></h1>
            <button onclick="switchView('admin')" class="glass px-6 py-2 rounded-full text-sm font-semibold hover:bg-white/20 transition">
                <i class="fa fa-lock-open mr-2"></i>Yönetim Paneli
            </button>
        </nav>

        <div class="z-10 text-center max-w-3xl">
            <h2 class="text-5xl md:text-6xl font-black text-white mb-6 leading-tight">Bir Sonraki Maceranı <span class="text-blue-400">Keşfet.</span></h2>
            <div class="relative group">
                <i class="fa fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-400 transition"></i>
                <input type="text" id="mainSearch" oninput="searchBooks(this.value)" 
                    class="w-full pl-16 pr-6 py-5 rounded-3xl bg-white/10 glass text-xl outline-none focus:ring-4 focus:ring-blue-500/50 transition-all"
                    placeholder="Kitap adı, yazar veya kategori ara...">
            </div>
            
            <!-- HIZLI KATEGORİLER -->
            <div class="flex flex-wrap justify-center gap-3 mt-8">
                <span onclick="filterByCategory('Roman')" class="category-pill glass px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Roman</span>
                <span onclick="filterByCategory('Tarih')" class="category-pill glass px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Tarih</span>
                <span onclick="filterByCategory('Bilim')" class="category-pill glass px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Bilim</span>
                <span onclick="filterByCategory('Kişisel Gelişim')" class="category-pill glass px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Kişisel Gelişim</span>
                <span onclick="filterByCategory('Edebiyat')" class="category-pill glass px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">Edebiyat</span>
            </div>
        </div>
    </header>

    <!-- MÜŞTERİ VİTRİNİ -->
    <main id="customerView" class="max-w-7xl mx-auto p-8 -mt-20 relative z-20">
        <!-- ÖNERİLENLER (RANDOM) -->
        <section class="mb-16">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold border-l-4 border-blue-500 pl-4">Sizin İçin Seçtiklerimiz</h3>
                <button onclick="loadFeatured()" class="text-blue-400 hover:text-white transition text-sm"><i class="fa fa-sync-alt mr-2"></i>Yenile</button>
            </div>
            <div id="featuredGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <!-- Random kitaplar -->
            </div>
        </section>

        <!-- TÜM ENVANTER -->
        <section>
            <h3 class="text-2xl font-bold mb-8 border-l-4 border-purple-500 pl-4">Kitap Envanteri</h3>
            <div id="mainGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
                <!-- Envanter -->
            </div>
        </section>
    </main>

    <!-- ANALYTICS DASHBOARD (ALT KATMAN) -->
    <footer id="dashboardView" class="bg-slate-900 border-t border-white/10 p-12 mt-20">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-2xl font-bold mb-8 text-blue-400"><i class="fa fa-chart-line mr-3"></i>Envanter Dashboard</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-400 text-sm">Toplam Kitap</p>
                    <h4 id="stat-total" class="text-4xl font-black mt-2">0</h4>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-400 text-sm">Farklı Yazar</p>
                    <h4 id="stat-authors" class="text-4xl font-black mt-2 text-green-400">0</h4>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-400 text-sm">Kategori Çeşitliliği</p>
                    <h4 id="stat-categories" class="text-4xl font-black mt-2 text-purple-400">0</h4>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-gray-400 text-sm">Envanter Değeri</p>
                    <h4 id="stat-value" class="text-4xl font-black mt-2 text-orange-400">0₺</h4>
                </div>
            </div>
        </div>
    </footer>

    <!-- ADMIN MODAL (YÖNETİM) -->
    <div id="adminModal" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-slate-900 w-full max-w-4xl rounded-[40px] border border-white/10 p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black">Envanter <span class="text-blue-500">Master</span></h2>
                <button onclick="switchView('customer')" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="admIsbn" placeholder="ISBN No" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500">
                        <button onclick="autoFill()" class="bg-blue-600 px-4 rounded-xl hover:bg-blue-700">Bul</button>
                    </div>
                    <input type="text" id="admTitle" placeholder="Kitap Adı" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                    <input type="text" id="admAuthor" placeholder="Yazar" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select id="admCategory" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-gray-300">
                            <option value="Roman">Roman</option>
                            <option value="Bilim">Bilim</option>
                            <option value="Tarih">Tarih</option>
                            <option value="Kişisel Gelişim">Kişisel Gelişim</option>
                            <option value="Edebiyat">Edebiyat</option>
                            <option value="Çocuk">Çocuk</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                        <input type="text" id="admShelf" placeholder="Raf (A1A)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-center">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="admPrice" placeholder="Fiyat (₺)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                        <input type="number" id="admStock" value="1" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                    </div>
                    <textarea id="admDesc" placeholder="Kitap özeti..." rows="3" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl"></textarea>
                    <input type="hidden" id="admId">
                    <input type="hidden" id="admCover">
                    
                    <button onclick="saveToSupabase()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-500/20">SİSTEME İŞLE</button>
                </div>
                
                <div id="imagePreview" class="bg-white/5 rounded-3xl flex flex-col items-center justify-center p-6 border-2 border-dashed border-white/10 min-h-[400px]">
                    <p class="text-gray-500 mb-4">Kitap Kapağı Önizleme</p>
                    <img id="prevImg" src="" class="max-h-[300px] rounded-xl shadow-2xl hidden">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI'; // <--- CTO'nun Key'i
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. OTOMATİK BAŞLATICI
        async function startEngine() {
            await loadFeatured();
            await loadMainGrid();
            await updateDashboard();
        }

        // 2. ÖNERİLENLER (RANDOM 5)
        async function loadFeatured() {
            const { data } = await sb.from('books_v2').select('*');
            if(data) {
                const shuffled = data.sort(() => 0.5 - Math.random()).slice(0, 5);
                renderBooks(shuffled, 'featuredGrid', true);
            }
        }

        // 3. TÜM ENVANTER
        async function loadMainGrid(query = "", category = "") {
            let q = sb.from('books_v2').select('*');
            if(query) q = q.or(`title.ilike.%${query}%,author.ilike.%${query}%`);
            if(category) q = q.eq('category', category);
            
            const { data } = await q.order('created_at', { ascending: false });
            renderBooks(data, 'mainGrid', false);
        }

        // 4. DASHBOARD İSTATİSTİKLERİ
        async function updateDashboard() {
            const { data } = await sb.from('books_v2').select('*');
            if(!data) return;

            document.getElementById('stat-total').innerText = data.length;
            
            const authors = [...new Set(data.map(b => b.author))].length;
            document.getElementById('stat-authors').innerText = authors;

            const categories = [...new Set(data.map(b => b.category))].length;
            document.getElementById('stat-categories').innerText = categories;

            const totalValue = data.reduce((sum, b) => sum + (parseFloat(b.price) || 0), 0);
            document.getElementById('stat-value').innerText = Math.round(totalValue) + "₺";
        }

        function renderBooks(books, targetId, isFeatured) {
            const container = document.getElementById(targetId);
            if(!books.length) { container.innerHTML = "<p class='col-span-full opacity-50 text-center py-10'>Henüz kitap yok.</p>"; return; }
            
            container.innerHTML = books.map(b => `
                <div class="book-card group bg-white/5 rounded-3xl p-4 glass cursor-pointer relative" onclick="openAdminEdit(${JSON.stringify(b).replace(/"/g, '&quot;')})">
                    <div class="absolute top-2 right-2 z-10">
                        <span class="bg-blue-500 text-[10px] font-bold px-2 py-0.5 rounded-full text-white">${b.category || 'Genel'}</span>
                    </div>
                    <div class="aspect-[2/3] overflow-hidden rounded-2xl mb-4 bg-slate-800">
                        <img src="${b.cover_url || 'https://via.placeholder.com/200x300?text=No+Cover'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <h4 class="font-bold text-sm truncate text-white">${b.title}</h4>
                    <p class="text-xs text-slate-400 truncate mb-2">${b.author}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-blue-400 font-bold text-sm">${b.price}₺</span>
                        <span class="text-[10px] text-slate-500 font-mono">${b.shelf_location || '-'}</span>
                    </div>
                </div>
            `).join('');
        }

        // GOOGLE BOOKS AUTOFILL
        async function autoFill() {
            const isbn = document.getElementById('admIsbn').value;
            if(!isbn) return;
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await res.json();
            if(data.items) {
                const b = data.items[0].volumeInfo;
                document.getElementById('admTitle').value = b.title;
                document.getElementById('admAuthor').value = b.authors ? b.authors[0] : '';
                document.getElementById('admDesc').value = b.description || '';
                const cover = b.imageLinks ? b.imageLinks.thumbnail.replace('http:','https:') : '';
                document.getElementById('admCover').value = cover;
                document.getElementById('prevImg').src = cover;
                document.getElementById('prevImg').classList.remove('hidden');
            }
        }

        async function saveToSupabase() {
            const id = document.getElementById('admId').value;
            const payload = {
                title: document.getElementById('admTitle').value,
                author: document.getElementById('admAuthor').value,
                isbn: document.getElementById('admIsbn').value,
                category: document.getElementById('admCategory').value,
                shelf_location: document.getElementById('admShelf').value,
                price: parseFloat(document.getElementById('admPrice').value),
                stock_count: parseInt(document.getElementById('admStock').value),
                description: document.getElementById('admDesc').value,
                cover_url: document.getElementById('admCover').value
            };

            const result = id ? await sb.from('books_v2').update(payload).eq('id', id) : await sb.from('books_v2').insert([payload]);
            if(!result.error) {
                alert("Sistem Güncellendi! 🚀");
                location.reload();
            }
        }

        function switchView(view) {
            if(view === 'admin') {
                const pin = prompt("Yönetici Erişimi:");
                if(pin === "1234") document.getElementById('adminModal').classList.remove('hidden');
            } else {
                document.getElementById('adminModal').classList.add('hidden');
            }
        }

        function openAdminEdit(b) {
            const pin = prompt("Düzenleme Yetkisi:");
            if(pin !== "1234") return;
            document.getElementById('adminModal').classList.remove('hidden');
            document.getElementById('admId').value = b.id;
            document.getElementById('admTitle').value = b.title;
            document.getElementById('admAuthor').value = b.author;
            document.getElementById('admCategory').value = b.category || 'Genel';
            document.getElementById('admShelf').value = b.shelf_location;
            document.getElementById('admPrice').value = b.price;
            document.getElementById('admStock').value = b.stock_count;
            document.getElementById('admDesc').value = b.description;
            document.getElementById('admCover').value = b.cover_url;
            document.getElementById('prevImg').src = b.cover_url;
            document.getElementById('prevImg').classList.remove('hidden');
        }

        function filterByCategory(cat) {
            loadMainGrid("", cat);
            document.getElementById('mainGrid').scrollIntoView({ behavior: 'smooth' });
        }

        function searchBooks(val) { loadMainGrid(val); }

        startEngine();
    </script>
</body>
</html>
