<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks Global | The Future of Reading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #e5e5e5; }
        .gradient-text { background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glow-button { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .map-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        .book-hover:hover { transform: scale(1.05) perspective(1000px) rotateY(10deg); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- GLOBAL NAV -->
    <nav class="fixed top-0 w-full z-[100] p-6 flex justify-between items-center glass-panel">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-indigo-600 to-pink-500 rounded-lg animate-pulse"></div>
            <h1 class="text-2xl font-bold tracking-tighter">DGBOOKS <span class="text-xs font-light opacity-50 uppercase tracking-widest">Global v4</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <select id="langSelect" class="bg-transparent border-none text-sm outline-none cursor-pointer">
                <option value="TR">TR</option>
                <option value="EN">EN</option>
            </select>
            <button onclick="openAdmin()" class="bg-white text-black px-5 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 hover:text-white transition-all glow-button">ADMIN ACCESS</button>
        </div>
    </nav>

    <!-- HERO / AI SEARCH -->
    <section class="min-h-screen flex flex-col items-center justify-center relative pt-20 px-4">
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-indigo-600/20 blur-[120px] rounded-full"></div>
        
        <div class="max-w-4xl w-full z-10 text-center">
            <h2 class="text-6xl md:text-8xl font-bold mb-8 tracking-tighter leading-none">
                Not just a shop, <br><span class="gradient-text">an experience.</span>
            </h2>
            
            <div class="glass-panel p-2 rounded-full flex items-center shadow-2xl">
                <input type="text" id="aiSearch" oninput="smartSearch(this.value)" 
                    class="bg-transparent w-full px-8 py-4 outline-none text-xl placeholder:opacity-30" 
                    placeholder="Search by mood, feeling or author...">
                <button class="bg-indigo-600 p-4 rounded-full w-14 h-14 flex items-center justify-center mr-1">
                    <i class="fa fa-wand-magic-sparkles"></i>
                </button>
            </div>
            
            <div class="flex justify-center gap-4 mt-8 opacity-60 text-sm">
                <span>Trending:</span>
                <button onclick="smartSearch('Dark Academia')" class="hover:text-indigo-400">#DarkAcademia</button>
                <button onclick="smartSearch('Sci-Fi')" class="hover:text-indigo-400">#SciFi</button>
                <button onclick="smartSearch('Mindfulness')" class="hover:text-indigo-400">#Mindfulness</button>
            </div>
        </div>
    </section>

    <!-- LIVE INVENTORY & MAP PREVIEW -->
    <main class="max-w-7xl mx-auto px-6 py-20 relative z-10">
        <div class="flex items-end justify-between mb-12">
            <div>
                <h3 class="text-3xl font-bold">Curated Collection</h3>
                <p class="opacity-50">Global stock updated 1s ago.</p>
            </div>
            <div id="stats" class="text-right text-xs font-mono opacity-50 uppercase tracking-widest">
                Nodes: <span id="nodeCount">0</span> | Value: <span id="nodeValue">0</span>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <!-- DETAIL MODAL / AR NAVIGATOR -->
    <div id="modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="glass-panel w-full max-w-5xl rounded-[40px] overflow-hidden flex flex-col md:flex-row shadow-2xl relative z-10">
            <div class="md:w-1/2 p-12 bg-white/5 flex items-center justify-center relative">
                <div id="mapOverlay" class="absolute inset-0 z-20 hidden p-12 flex flex-col justify-center items-center bg-indigo-900/90 text-center">
                    <i class="fa fa-location-arrow text-5xl mb-4 animate-bounce"></i>
                    <h4 class="text-2xl font-bold mb-2">Shelf Navigation</h4>
                    <p class="text-sm opacity-70 mb-6">Aisle 3, Section B, Shelf 2</p>
                    <div class="w-full h-40 bg-white/10 rounded-2xl relative">
                        <!-- Prototypic Map -->
                        <div class="absolute top-1/2 left-0 w-full h-1 bg-white/10"></div>
                        <div class="absolute top-0 left-1/3 w-1 h-full bg-white/10"></div>
                        <div class="w-4 h-4 bg-indigo-500 rounded-full absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2 glow-button"></div>
                    </div>
                    <button onclick="toggleMap()" class="mt-8 text-xs underline">Back to Book</button>
                </div>
                <img id="mImg" src="" class="max-h-[500px] shadow-2xl rounded-lg book-hover transition-all duration-500">
            </div>
            <div class="md:w-1/2 p-12 flex flex-col justify-between">
                <div>
                    <span id="mCat" class="text-xs font-bold tracking-widest uppercase text-indigo-400"></span>
                    <h3 id="mTitle" class="text-5xl font-bold my-4 leading-none"></h3>
                    <p id="mAuthor" class="text-xl opacity-60 mb-8"></p>
                    <p id="mDesc" class="text-sm leading-relaxed opacity-80 mb-8 max-h-40 overflow-y-auto"></p>
                </div>
                <div class="flex items-center justify-between border-t border-white/10 pt-8">
                    <div>
                        <p class="text-xs opacity-40 uppercase tracking-widest mb-1">In-Store Location</p>
                        <button onclick="toggleMap()" class="text-xl font-bold hover:text-indigo-400 transition flex items-center gap-2">
                            <i class="fa fa-map-pin"></i> <span id="mShelf"></span>
                        </button>
                    </div>
                    <div class="text-right">
                        <p id="mPrice" class="text-4xl font-bold"></p>
                        <button class="bg-indigo-600 px-8 py-3 rounded-full text-sm font-bold mt-4 glow-button">RESERVE NOW</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTING THE BRAIN -->
    <script>
        const SB_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const { data } = await sb.from('books_v2').select('*').order('created_at', {ascending: false});
            if(data) {
                render(data);
                updateStats(data);
            }
        }

        function render(books) {
            const grid = document.getElementById('grid');
            grid.innerHTML = books.map(b => `
                <div onclick='openBook(${JSON.stringify(b).replace(/'/g, "&#39;")})' class="group cursor-pointer">
                    <div class="aspect-[2/3] overflow-hidden rounded-[30px] mb-6 relative glass-panel book-hover transition-all duration-500">
                        <img src="${b.cover_url || 'https://via.placeholder.com/400x600'}" class="w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 transition-all">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all p-6 flex flex-col justify-end">
                            <span class="text-[10px] font-bold tracking-widest uppercase mb-1">${b.shelf_location}</span>
                            <p class="text-xs font-bold">VIEW NAVIGATION</p>
                        </div>
                    </div>
                    <h4 class="font-bold truncate">${b.title}</h4>
                    <p class="text-xs opacity-50">${b.author}</p>
                </div>
            `).join('');
        }

        function openBook(b) {
            document.getElementById('mTitle').innerText = b.title;
            document.getElementById('mAuthor').innerText = b.author;
            document.getElementById('mDesc').innerText = b.description || "No metadata available for this global node.";
            document.getElementById('mPrice').innerText = b.price + "₺";
            document.getElementById('mShelf').innerText = b.shelf_location;
            document.getElementById('mCat').innerText = b.category || "General";
            document.getElementById('mImg').src = b.cover_url;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('mapOverlay').classList.add('hidden');
        }

        function toggleMap() {
            document.getElementById('mapOverlay').classList.toggle('hidden');
        }

        async function smartSearch(val) {
            // AI-Like Semantic Search Simulation
            const { data } = await sb.from('books_v2').select('*')
                .or(`title.ilike.%${val}%,author.ilike.%${val}%,mood_tags.ilike.%${val}%,category.ilike.%${val}%`);
            render(data || []);
        }

        function updateStats(data) {
            document.getElementById('nodeCount').innerText = data.length;
            const val = data.reduce((s, b) => s + (b.price || 0), 0);
            document.getElementById('nodeValue').innerText = Math.round(val) + "₺";
        }

        function openAdmin() {
            const p = prompt("ACCESS CODE:");
            if(p === "1234") window.location.href = "#admin"; // Logic for actual admin page redirection
        }

        init();
    </script>
</body>
</html>
