<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks | Profesyonel Kitap Sistemi</title>
    <!-- Tailwind CSS ve FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .book-card:hover img { transform: scale(1.05); }
        .modal-bg { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        .admin-only { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- NAVIGASYON -->
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter cursor-pointer" onclick="switchView('customer')">📚 DGBOOKS</h1>
            <div id="nav-buttons">
                <button id="login-btn" onclick="switchView('login')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition">Admin Giriş</button>
                <button id="logout-btn" onclick="logout()" class="hidden bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm transition">Çıkış Yap</button>
            </div>
        </div>
    </nav>

    <!-- MÜŞTERİ EKRANI -->
    <div id="view-customer" class="max-w-6xl mx-auto p-6">
        <div class="mb-8">
            <div class="relative max-w-2xl mx-auto">
                <i class="fa fa-search absolute left-4 top-4 text-gray-400"></i>
                <input type="text" id="cust-search" oninput="searchBooks(this.value)" placeholder="Kitap, yazar veya raf ara..." 
                    class="w-full pl-12 pr-4 py-3 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>
        </div>
        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Kitaplar buraya gelecek -->
        </div>
    </div>

    <!-- ADMIN GİRİŞ EKRANI -->
    <div id="view-login" class="hidden max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Yönetici Girişi</h2>
        <input type="password" id="admin-pass" placeholder="PIN Kodu" class="w-full p-3 border rounded-lg mb-4 outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-slate-800">Giriş Yap</button>
        <button onclick="switchView('customer')" class="w-full mt-4 text-gray-500 text-sm">Geri Dön</button>
    </div>

    <!-- ADMIN PANELİ -->
    <div id="view-admin" class="hidden max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Envanter Yönetimi</h2>
            <button onclick="openAddModal()" class="bg-green-600 text-white px-6 py-2 rounded-full shadow-lg hover:bg-green-700 transition">
                <i class="fa fa-plus mr-2"></i>Yeni Kitap Ekle
            </button>
        </div>
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-4">Kitap</th>
                        <th class="p-4">Raf</th>
                        <th class="p-4">Fiyat</th>
                        <th class="p-4 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Tablo satırları -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- KİTAP DETAY MODALI (MÜŞTERİ İÇİN) -->
    <div id="detail-modal" class="hidden fixed inset-0 modal-bg z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row relative">
            <button onclick="closeModal('detail-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-black z-10"><i class="fa fa-times text-2xl"></i></button>
            <div class="md:w-1/2 bg-gray-100">
                <img id="det-img" src="" class="w-full h-full object-contain p-8">
            </div>
            <div class="md:w-1/2 p-8 overflow-y-auto max-h-[80vh]">
                <span id="det-shelf" class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase"></span>
                <h2 id="det-title" class="text-3xl font-bold mt-4 mb-2"></h2>
                <p id="det-author" class="text-xl text-gray-600 mb-6"></p>
                <div class="border-t border-b py-4 mb-6">
                    <p id="det-desc" class="text-gray-500 leading-relaxed"></p>
                </div>
                <div class="flex justify-between items-center">
                    <span id="det-price" class="text-3xl font-black text-slate-900"></span>
                    <button class="bg-slate-900 text-white px-6 py-3 rounded-xl">Stokta Var</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ENVANTER EKLE/DÜZENLE MODALI -->
    <div id="edit-modal" class="hidden fixed inset-0 modal-bg z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-3xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 id="edit-modal-title" class="text-2xl font-bold mb-6">Kitap Kayıt</h2>
            
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Sol Kolon: Bilgiler -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">ISBN / Barkod No</label>
                        <div class="flex gap-2">
                            <input type="text" id="edit-isbn" class="flex-1 p-2 border rounded-lg">
                            <button onclick="fetchSuggestions()" class="bg-slate-800 text-white px-4 rounded-lg">Bul & Öner</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Kitap Adı</label>
                        <input type="text" id="edit-title" class="w-full p-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Yazar</label>
                        <input type="text" id="edit-author" class="w-full p-2 border rounded-lg">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-sm font-bold mb-1">Raf Kodu</label>
                            <input type="text" id="edit-shelf" class="w-full p-2 border rounded-lg">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-bold mb-1">Fiyat (₺)</label>
                            <input type="number" id="edit-price" class="w-full p-2 border rounded-lg">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Açıklama</label>
                        <textarea id="edit-desc" rows="3" class="w-full p-2 border rounded-lg"></textarea>
                    </div>
                    <input type="hidden" id="edit-id">
                    <input type="hidden" id="edit-cover">
                </div>

                <!-- Sağ Kolon: Resim Önerileri -->
                <div>
                    <label class="block text-sm font-bold mb-3 text-blue-600">Önerilen Resimler (Seçiniz)</label>
                    <div id="image-suggestions" class="grid grid-cols-2 gap-4 border-2 border-dashed border-gray-200 p-4 rounded-xl min-h-[300px]">
                        <p class="text-gray-400 text-center col-span-2 mt-20">ISBN veya Başlık yazıp 'Öner'e basın</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-4">
                <button onclick="saveBook()" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-bold text-lg">KAYDET</button>
                <button onclick="closeModal('edit-modal')" class="flex-1 bg-gray-200 py-4 rounded-xl font-bold text-lg text-gray-600">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI'; // <--- KEY'İNİZİ EKLEYİN
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        // GÖRÜNÜM DEĞİŞTİRME
        function switchView(view) {
            document.getElementById('view-customer').classList.add('hidden');
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            
            if(view === 'customer') loadCustomerGrid();
            if(view === 'admin') loadAdminTable();
        }

        // LOGIN / LOGOUT
        function login() {
            const pin = document.getElementById('admin-pass').value;
            if(pin === "1234") { // Sizin PIN'iniz
                isAdmin = true;
                localStorage.setItem('dgAdmin', 'true');
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                switchView('admin');
            } else {
                alert("Hatalı PIN!");
            }
        }

        function logout() {
            isAdmin = false;
            localStorage.removeItem('dgAdmin');
            document.getElementById('login-btn').classList.remove('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            switchView('customer');
        }

        // VERİ YÜKLEME (MÜŞTERİ)
        async function loadCustomerGrid(query = "") {
            let q = sb.from('books_v2').select('*');
            if(query) q = q.or(`title.ilike.%${query}%,author.ilike.%${query}%,shelf_location.ilike.%${query}%`);
            const { data } = await q.order('title');
            
            const grid = document.getElementById('book-grid');
            grid.innerHTML = data.map(b => `
                <div onclick='openDetail(${JSON.stringify(b)})' class="book-card bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer transition transform hover:-translate-y-1">
                    <img src="${b.cover_url || 'https://via.placeholder.com/200x300'}" class="w-full h-48 object-cover transition duration-300">
                    <div class="p-4">
                        <p class="text-xs font-bold text-blue-500 uppercase">${b.shelf_location || '-'}</p>
                        <h3 class="font-bold text-sm truncate">${b.title}</h3>
                        <p class="text-gray-500 text-xs truncate">${b.author}</p>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(b) {
            document.getElementById('det-title').innerText = b.title;
            document.getElementById('det-author').innerText = b.author;
            document.getElementById('det-shelf').innerText = "KONUM: " + (b.shelf_location || "BELİRSİZ");
            document.getElementById('det-price').innerText = b.price + " ₺";
            document.getElementById('det-desc').innerText = b.description || "Bu kitap hakkında henüz detaylı açıklama girilmemiş.";
            document.getElementById('det-img').src = b.cover_url || 'https://via.placeholder.com/300x500';
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        // VERİ YÜKLEME (ADMIN)
        async function loadAdminTable() {
            const { data } = await sb.from('books_v2').select('*').order('created_at', {ascending: false});
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = data.map(b => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 flex items-center gap-3">
                        <img src="${b.cover_url}" class="w-10 h-14 object-cover rounded">
                        <div>
                            <p class="font-bold">${b.title}</p>
                            <p class="text-xs text-gray-500">${b.author}</p>
                        </div>
                    </td>
                    <td class="p-4 font-mono font-bold text-blue-600">${b.shelf_location}</td>
                    <td class="p-4 font-bold">${b.price} ₺</td>
                    <td class="p-4 text-right space-x-2">
                        <button onclick='openEditModal(${JSON.stringify(b)})' class="text-blue-600 hover:text-blue-900"><i class="fa fa-edit"></i></button>
                        <button onclick='deleteBook("${b.id}")' class="text-red-600 hover:text-red-900"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // AKILLI RESİM ÖNERİ MOTORU
        async function fetchSuggestions() {
            const isbn = document.getElementById('edit-isbn').value;
            const title = document.getElementById('edit-title').value;
            const author = document.getElementById('edit-author').value;
            const suggDiv = document.getElementById('image-suggestions');
            suggDiv.innerHTML = '<p class="col-span-2 text-center py-10">Resimler aranıyor...</p>';

            let images = [];

            // 1. Google Books API
            try {
                const q = isbn ? `isbn:${isbn}` : `${title} ${author}`;
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}`);
                const data = await res.json();
                if(data.items) {
                    data.items.slice(0, 3).forEach(item => {
                        if(item.volumeInfo.imageLinks) {
                            images.push(item.volumeInfo.imageLinks.thumbnail.replace('http:', 'https:'));
                        }
                    });
                    // Bilgileri de dolduralım (Eğer boşsa)
                    const b = data.items[0].volumeInfo;
                    if(!document.getElementById('edit-title').value) document.getElementById('edit-title').value = b.title;
                    if(!document.getElementById('edit-author').value) document.getElementById('edit-author').value = b.authors[0];
                    if(!document.getElementById('edit-desc').value) document.getElementById('edit-desc').value = b.description;
                    if(!document.getElementById('edit-shelf').value) document.getElementById('edit-shelf').value = b.title[0].toUpperCase() + "1A";
                }
            } catch(e) {}

            // 2. Open Library API (Alternatif)
            if(isbn) {
                images.push(`https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`);
            }

            // Render Suggestions
            suggDiv.innerHTML = images.map(img => `
                <div onclick="selectImage('${img}')" class="cursor-pointer border-4 border-transparent hover:border-blue-500 rounded-lg overflow-hidden h-40">
                    <img src="${img}" class="w-full h-full object-contain">
                </div>
            `).join('') + `
                <div class="col-span-2 mt-2">
                    <input type="text" id="manual-img-url" placeholder="Veya manuel resim URL yapıştırın..." oninput="selectImage(this.value)" class="w-full text-xs p-2 border rounded">
                </div>
            `;
        }

        function selectImage(url) {
            document.getElementById('edit-cover').value = url;
            // Görsel geri bildirim
            const divs = document.querySelectorAll('#image-suggestions div');
            divs.forEach(d => d.style.borderColor = 'transparent');
            event.currentTarget.style.borderColor = '#2563eb';
        }

        // KAYDET / SİL
        async function saveBook() {
            const payload = {
                title: document.getElementById('edit-title').value,
                author: document.getElementById('edit-author').value,
                isbn: document.getElementById('edit-isbn').value,
                shelf_location: document.getElementById('edit-shelf').value,
                price: parseFloat(document.getElementById('edit-price').value),
                description: document.getElementById('edit-desc').value,
                cover_url: document.getElementById('edit-cover').value
            };
            const id = document.getElementById('edit-id').value;

            let error;
            if(id) {
                const res = await sb.from('books_v2').update(payload).eq('id', id);
                error = res.error;
            } else {
                const res = await sb.from('books_v2').insert([payload]);
                error = res.error;
            }

            if(!error) {
                alert("Envanter güncellendi!");
                closeModal('edit-modal');
                loadAdminTable();
            } else { alert("Hata: " + error.message); }
        }

        async function deleteBook(id) {
            if(confirm("Bu kitap tamamen silinecek?")) {
                await sb.from('books_v2').delete().eq('id', id);
                loadAdminTable();
            }
        }

        // MODAL YARDIMCILARI
        function openAddModal() {
            resetEditForm();
            document.getElementById('edit-modal-title').innerText = "Yeni Kitap Ekle";
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function openEditModal(b) {
            document.getElementById('edit-modal-title').innerText = "Kitabı Düzenle";
            document.getElementById('edit-id').value = b.id;
            document.getElementById('edit-title').value = b.title;
            document.getElementById('edit-author').value = b.author;
            document.getElementById('edit-isbn').value = b.isbn;
            document.getElementById('edit-shelf').value = b.shelf_location;
            document.getElementById('edit-price').value = b.price;
            document.getElementById('edit-desc').value = b.description;
            document.getElementById('edit-cover').value = b.cover_url;
            document.getElementById('image-suggestions').innerHTML = `<img src="${b.cover_url}" class="h-40 mx-auto col-span-2">`;
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function resetEditForm() {
            document.querySelectorAll('#edit-modal input, #edit-modal textarea').forEach(i => i.value = "");
            document.getElementById('image-suggestions').innerHTML = '<p class="text-gray-400 text-center col-span-2 mt-20">ISBN veya Başlık yazıp \'Öner\'e basın</p>';
        }

        function searchBooks(val) { loadCustomerGrid(val); }

        // SAYFA YÜKLENDİĞİNDE
        loadCustomerGrid();
        if(localStorage.getItem('dgAdmin')) {
            document.getElementById('admin-pass').value = "1234";
            login();
        }
    </script>
</body>
</html>
