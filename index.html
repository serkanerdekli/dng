<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks OS | Akıllı Envanter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="text-slate-800">

    <!-- NAVIGASYON -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showView('customer')">
            <i class="fa fa-book-sparkles text-indigo-600 text-2xl"></i>
            <h1 class="text-xl font-extrabold tracking-tighter">DGBOOKS</h1>
        </div>
        <div id="navActions">
            <button onclick="showView('login')" id="loginBtn" class="text-sm font-bold text-slate-500 hover:text-indigo-600">Yönetici Erişimi</button>
            <button onclick="logout()" id="logoutBtn" class="hidden text-sm font-bold text-red-500">Güvenli Çıkış</button>
        </div>
    </nav>

    <!-- 1. MÜŞTERİ EKRANI -->
    <main id="view-customer" class="view-section active pt-32 px-6 max-w-6xl mx-auto pb-20">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black mb-6 text-slate-900 tracking-tight">Kitabını <span class="text-indigo-600">Hemen Bul.</span></h2>
            <div class="relative max-w-2xl mx-auto shadow-2xl rounded-3xl overflow-hidden bg-white">
                <i class="fa fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="custSearch" oninput="handleSearch(this.value)" 
                    class="w-full pl-16 pr-6 py-5 outline-none text-lg border-none" 
                    placeholder="İsim, yazar veya raf kodu yazın...">
            </div>
            <div class="flex flex-wrap justify-center gap-4 mt-6 text-sm font-semibold text-slate-400">
                <span class="opacity-50 uppercase">Hızlı:</span>
                <button onclick="quickSearch('Roman')" class="hover:text-indigo-600">#Roman</button>
                <button onclick="quickSearch('Klasik')" class="hover:text-indigo-600">#Klasik</button>
                <button onclick="quickSearch('A1A')" class="hover:text-indigo-600">#RafA1A</button>
            </div>
        </div>

        <div id="customerDashboard">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-2 text-slate-700">Yeni Eklenenler</h3>
            <div id="newArrivalsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
        </div>

        <div id="searchResults" class="hidden">
            <h3 class="text-xl font-bold mb-8 text-indigo-600">Arama Sonuçları</h3>
            <div id="searchGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </div>
    </main>

    <!-- 2. LOGIN EKRANI -->
    <section id="view-login" class="view-section pt-40 px-6 max-w-md mx-auto">
        <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100 text-center">
            <h2 class="text-2xl font-bold mb-6">Yönetici Erişimi</h2>
            <input type="password" id="adminPin" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 text-center text-3xl tracking-[0.5em] outline-none focus:border-indigo-500 mb-6" placeholder="****">
            <button onclick="attemptLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition">Giriş Yap</button>
            <button onclick="showView('customer')" class="mt-4 text-sm text-slate-400">Geri Dön</button>
        </div>
    </section>

    <!-- 3. ADMIN PANELİ -->
    <section id="view-admin" class="view-section pt-32 px-6 max-w-7xl mx-auto pb-20">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-4xl font-black text-slate-900">Envanter <span class="text-indigo-600">Yönetimi</span></h2>
                <p class="text-slate-500 font-medium">Hoş geldiniz. Envanteri buradan yönetebilirsiniz.</p>
            </div>
            <button onclick="openEditor()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-indigo-700 shadow-xl">+ Yeni Kitap</button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-5 font-bold text-slate-600">Kitap & Yazar</th>
                        <th class="p-5 font-bold text-slate-600">Raf / Fiyat</th>
                        <th class="p-5 font-bold text-slate-600 text-right">İşlemler</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </section>

    <!-- KİTAP EDİTÖRÜ MODAL -->
    <div id="editorModal" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[40px] p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold" id="modalTitle">Kitap Verisi</h2>
                <button onclick="closeEditor()" class="text-3xl text-slate-300 hover:text-slate-900">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="fTitle" placeholder="Kitap Adı" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                    <input type="text" id="fAuthor" placeholder="Yazar" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                    <button onclick="autoFillByInfo()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold text-sm hover:bg-black">
                        <i class="fa fa-wand-magic-sparkles mr-2"></i> Kitap Bilgilerini & Resmi Bul
                    </button>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="fIsbn" placeholder="ISBN" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                        <input type="text" id="fShelf" placeholder="Raf (A1A)" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-center font-bold text-indigo-600">
                    </div>
                    <input type="number" id="fPrice" placeholder="Fiyat" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                    <input type="hidden" id="fId">
                    <input type="hidden" id="fCover">
                    <button onclick="saveBook()" class="w-full bg-indigo-600 text-white py-5 rounded-[25px] font-black text-xl hover:bg-indigo-700">KAYDET</button>
                </div>
                <div class="bg-slate-50 rounded-[40px] flex flex-col items-center justify-center p-8 border-4 border-dashed border-slate-200">
                    <img id="fPrevImg" src="" class="max-h-[350px] rounded-2xl shadow-2xl hidden">
                    <div id="fPrevPlaceholder" class="text-center text-slate-400">
                        <i class="fa fa-image text-5xl mb-4"></i>
                        <p class="text-sm">Kapak otomatik gelecek.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI'; // <--- KEY'İNİ EKLE
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let allBooks = [];

        async function init() {
            const { data } = await sb.from('books_v2').select('*').order('created_at', {ascending: false});
            if(data) {
                allBooks = data;
                renderCustomerDashboard();
                renderAdminTable();
                
                // Oturum Kontrolü: Eğer zaten logindeyse admin ekranında kalsın
                if(sessionStorage.getItem('isLogged') === 'true') {
                    showView('admin', true);
                }
            }
        }

        function showView(viewId, force = false) {
            if(viewId === 'admin' && sessionStorage.getItem('isLogged') !== 'true' && !force) {
                showView('login');
                return;
            }

            document.querySelectorAll('.view-section, main').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('view-' + viewId) || document.getElementById('view-customer');
            target.classList.add('active');

            if(sessionStorage.getItem('isLogged') === 'true') {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
            }
        }

        function attemptLogin() {
            if(document.getElementById('adminPin').value === "1234") {
                sessionStorage.setItem('isLogged', 'true');
                showView('admin');
            } else { alert("Hatalı PIN!"); }
        }

        function logout() { sessionStorage.removeItem('isLogged'); location.reload(); }

        // --- MÜŞTERİ ---
        function renderCustomerDashboard() {
            const grid = document.getElementById('newArrivalsGrid');
            grid.innerHTML = allBooks.slice(0, 4).map(b => bookCardTemplate(b)).join('');
        }

        function handleSearch(val) {
            const dash = document.getElementById('customerDashboard');
            const results = document.getElementById('searchResults');
            const grid = document.getElementById('searchGrid');

            if(val.length > 1) {
                dash.classList.add('hidden');
                results.classList.remove('hidden');
                const filtered = allBooks.filter(b => 
                    b.title.toLowerCase().includes(val.toLowerCase()) || 
                    b.author.toLowerCase().includes(val.toLowerCase()) ||
                    b.shelf_location.toLowerCase().includes(val.toLowerCase())
                );
                grid.innerHTML = filtered.map(b => bookCardTemplate(b)).join('');
            } else {
                dash.classList.remove('hidden');
                results.classList.add('hidden');
            }
        }

        function quickSearch(v) { document.getElementById('custSearch').value = v; handleSearch(v); }

        function bookCardTemplate(b) {
            return `<div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl transition-all group">
                <img src="${b.cover_url || 'https://via.placeholder.com/200x300'}" class="w-full aspect-[2/3] object-cover rounded-2xl mb-4 group-hover:scale-105 transition">
                <h4 class="font-bold text-sm truncate">${b.title}</h4>
                <p class="text-xs text-slate-400 truncate mb-3">${b.author}</p>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-1 rounded">📍 ${b.shelf_location}</span><span class="text-sm font-black">${b.price}₺</span></div>
            </div>`;
        }

        // --- ADMIN ---
        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = allBooks.map(b => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="p-5 flex items-center gap-4">
                        <img src="${b.cover_url}" class="w-10 h-14 rounded-lg object-cover shadow-sm">
                        <div><div class="font-bold text-slate-800">${b.title}</div><div class="text-xs text-slate-400">${b.author}</div></div>
                    </td>
                    <td class="p-5">
                        <div class="text-xs font-bold text-indigo-600">${b.shelf_location}</div>
                        <div class="text-sm font-black">${b.price}₺</div>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick='openEditor(${JSON.stringify(b).replace(/'/g, "&#39;")})' class="text-slate-400 hover:text-indigo-600 mr-4"><i class="fa fa-edit"></i></button>
                        <button onclick='deleteBook("${b.id}")' class="text-slate-400 hover:text-red-500"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function openEditor(b = null) {
            document.getElementById('editorModal').classList.remove('hidden');
            if(b) {
                document.getElementById('fId').value = b.id;
                document.getElementById('fTitle').value = b.title;
                document.getElementById('fAuthor').value = b.author;
                document.getElementById('fIsbn').value = b.isbn || "";
                document.getElementById('fShelf').value = b.shelf_location;
                document.getElementById('fPrice').value = b.price;
                document.getElementById('fCover').value = b.cover_url;
                updatePreview(b.cover_url);
            } else { resetEditor(); }
        }

        async function saveBook() {
            const payload = {
                title: document.getElementById('fTitle').value,
                author: document.getElementById('fAuthor').value,
                isbn: document.getElementById('fIsbn').value,
                shelf_location: document.getElementById('fShelf').value,
                price: parseFloat(document.getElementById('fPrice').value) || 0,
                cover_url: document.getElementById('fCover').value
            };
            const id = document.getElementById('fId').value;
            const res = id ? await sb.from('books_v2').update(payload).eq('id', id) : await sb.from('books_v2').insert([payload]);
            
            if(!res.error) {
                closeEditor();
                init(); // Sayfa yenilemeden verileri güncelle
            }
        }

        async function deleteBook(id) {
            if(confirm("Emin misin?")) {
                await sb.from('books_v2').delete().eq('id', id);
                init();
            }
        }

        async function autoFillByInfo() {
            const title = document.getElementById('fTitle').value;
            const author = document.getElementById('fAuthor').value;
            const q = encodeURIComponent(`intitle:${title} inauthor:${author}`);
            const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
            const data = await res.json();
            if(data.items) {
                const info = data.items[0].volumeInfo;
                document.getElementById('fTitle').value = info.title;
                document.getElementById('fAuthor').value = info.authors ? info.authors[0] : author;
                const cover = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : '';
                document.getElementById('fCover').value = cover;
                updatePreview(cover);
                document.getElementById('fShelf').value = info.title[0].toUpperCase() + "1A";
            }
        }

        function updatePreview(url) {
            const img = document.getElementById('fPrevImg');
            const placeholder = document.getElementById('fPrevPlaceholder');
            if(url) { img.src = url; img.classList.remove('hidden'); placeholder.classList.add('hidden'); }
            else { img.classList.add('hidden'); placeholder.classList.remove('hidden'); }
        }

        function closeEditor() { document.getElementById('editorModal').classList.add('hidden'); }
        function resetEditor() {
            document.getElementById('fId').value = "";
            document.querySelectorAll('#editorModal input').forEach(i => i.value = "");
            updatePreview("");
        }

        init();
    </script>
</body>
</html>
