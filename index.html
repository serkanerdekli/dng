<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks Pro | Stabil Sürüm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a1a2e; --accent: #16213e; --success: #27ae60; --danger: #e74c3c; --bg: #f4f4f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .header { position: fixed; top: 0; width: 100%; background: var(--primary); color: white; padding: 15px 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header-content { max-width: 800px; margin: 0 auto; padding: 0 15px; text-align: center; }
        .search-box { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; margin-top: 10px; font-size: 1rem; outline: none; }

        .container { max-width: 900px; margin: 140px auto 100px; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 10px; }
        .card-title { font-weight: bold; font-size: 0.85rem; height: 35px; overflow: hidden; }

        /* Modern Admin Panel */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; max-width: 450px; margin: 10px auto; border-radius: 15px; padding: 20px; position: relative; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--success); color: white; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-delete { background: var(--danger); color: white; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .no-data { text-align: center; grid-column: 1/-1; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <h2 style="margin:0;">📚 DGBOOKS PRO</h2>
        <input type="text" class="search-box" id="searchInput" placeholder="Kitap, yazar veya raf ara..." oninput="handleSearch()">
    </div>
</div>

<div class="container">
    <div id="results" class="grid"></div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0;">Envanter Yönetimi</h3>
        
        <div class="form-group" style="background: #f9f9f9; padding: 10px; border-radius: 10px;">
            <label><i class="fa fa-barcode"></i> ISBN Okut / Yaz</label>
            <input type="text" id="bIsbn" placeholder="Barkodu buraya yazın..." oninput="if(this.value.length >= 10) fetchFromGoogle(this.value)">
            <small style="color:#777;">Barkodu yazdığınızda bilgiler otomatik gelir.</small>
        </div>

        <div class="form-group">
            <label>Kitap Adı</label>
            <input type="text" id="bTitle">
        </div>
        <div class="form-group">
            <label>Yazar</label>
            <input type="text" id="bAuthor">
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Raf Kodu</label>
                <input type="text" id="bShelf" placeholder="A1A">
            </div>
            <div style="flex:1">
                <label>Fiyat (₺)</label>
                <input type="number" id="bPrice" step="0.01">
            </div>
        </div>
        
        <input type="hidden" id="bookId">
        <input type="hidden" id="bCover">

        <button class="btn btn-save" onclick="submitBook()">ENVANTERE KAYDET</button>
        <button id="delBtn" class="btn btn-delete" style="display:none;" onclick="deleteBook()">SİL</button>
        <button class="btn btn-cancel" onclick="closeAdmin()">VAZGEÇ</button>
    </div>
</div>

<div class="fab" onclick="openAddMode()"><i class="fa fa-plus"></i></div>

<script>
    const SUPABASE_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadBooks() {
        const { data, error } = await supabaseClient.from('books_v2').select('*').order('created_at', { ascending: false });
        renderGrid(data || []);
    }

    function renderGrid(books) {
        const container = document.getElementById('results');
        if (books.length === 0) {
            container.innerHTML = '<div class="no-data"><i class="fa fa-search" font-size:3rem></i><p>Kitap bulunamadı.</p></div>';
            return;
        }
        container.innerHTML = books.map(book => `
            <div class="card" onclick='openEditMode(${JSON.stringify(book)})'>
                <img src="${book.cover_url || 'https://via.placeholder.com/200x300?text=Dgbooks'}">
                <div class="card-body">
                    <div class="card-title">${book.title}</div>
                    <div style="color:var(--success); font-weight:bold; margin-top:5px;">📍 ${book.shelf_location || '-'}</div>
                    <div style="font-size:0.9rem; margin-top:5px; font-weight:bold;">${book.price || 0} ₺</div>
                </div>
            </div>
        `).join('');
    }

    async function handleSearch() {
        const q = document.getElementById('searchInput').value;
        if(!q) return loadBooks();
        const { data } = await supabaseClient.from('books_v2').select('*')
            .or(`title.ilike.%${q}%,author.ilike.%${q}%,isbn.eq.${q}%,shelf_location.ilike.%${q}%`);
        renderGrid(data || []);
    }

    async function fetchFromGoogle(isbn) {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
        const data = await res.json();
        if(data.items) {
            const b = data.items[0].volumeInfo;
            document.getElementById('bTitle').value = b.title || '';
            document.getElementById('bAuthor').value = b.authors ? b.authors[0] : '';
            document.getElementById('bCover').value = b.imageLinks ? b.imageLinks.thumbnail : '';
            document.getElementById('bShelf').value = b.title ? b.title.charAt(0).toUpperCase() + "1A" : "";
        }
    }

    function openAddMode() {
        resetForm();
        document.getElementById('adminModal').style.display = 'block';
    }

    function openEditMode(book) {
        document.getElementById('adminModal').style.display = 'block';
        document.getElementById('bookId').value = book.id;
        document.getElementById('bTitle').value = book.title;
        document.getElementById('bAuthor').value = book.author;
        document.getElementById('bIsbn').value = book.isbn;
        document.getElementById('bShelf').value = book.shelf_location;
        document.getElementById('bPrice').value = book.price;
        document.getElementById('bCover').value = book.cover_url;
        document.getElementById('delBtn').style.display = 'block';
        document.getElementById('modalTitle').innerText = "Kitabı Düzenle";
    }

    async function submitBook() {
        const id = document.getElementById('bookId').value;
        const payload = {
            title: document.getElementById('bTitle').value,
            author: document.getElementById('bAuthor').value,
            isbn: document.getElementById('bIsbn').value,
            shelf_location: document.getElementById('bShelf').value,
            price: parseFloat(document.getElementById('bPrice').value) || 0,
            cover_url: document.getElementById('bCover').value
        };

        let result;
        if(id) {
            result = await supabaseClient.from('books_v2').update(payload).eq('id', id);
        } else {
            result = await supabaseClient.from('books_v2').insert([payload]);
        }

        if(!result.error) {
            alert("Başarıyla Kaydedildi!");
            closeAdmin();
            loadBooks();
        } else {
            alert("Hata: " + result.error.message);
        }
    }

    async function deleteBook() {
        if(confirm("Silmek istediğinize emin misiniz?")) {
            const id = document.getElementById('bookId').value;
            await supabaseClient.from('books_v2').delete().eq('id', id);
            closeAdmin();
            loadBooks();
        }
    }

    function resetForm() {
        document.getElementById('bookId').value = "";
        document.getElementById('bTitle').value = "";
        document.getElementById('bAuthor').value = "";
        document.getElementById('bIsbn').value = "";
        document.getElementById('bShelf').value = "";
        document.getElementById('bPrice').value = "";
        document.getElementById('bCover').value = "";
        document.getElementById('delBtn').style.display = 'none';
        document.getElementById('modalTitle').innerText = "Yeni Kitap Ekle";
    }

    function closeAdmin() {
        document.getElementById('adminModal').style.display = 'none';
    }

    loadBooks();
</script>
</body>
</html>
