<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dgbooks - Akıllı Stok Yönetimi</title>
    <!-- CSS: Temiz ve Modern Görünüm -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; font-size: 1.5rem; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 2px solid #3498db; }
        .result-card { display: none; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 20px; background: #fafafa; }
        .result-card img { width: 100px; float: left; margin-right: 15px; border-radius: 4px; }
        .result-details { overflow: hidden; }
        .btn { display: block; width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-scan { background: #3498db; margin-bottom: 10px; }
        .status { text-align: center; color: #7f8c8d; margin-top: 10px; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
    <!-- Kütüphaneler: Barkod Okuyucu ve Supabase -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h1>📚 Dgbooks Stok Girişi</h1>
    
    <!-- Barkod Okuma Alanı -->
    <div id="reader"></div>
    <button class="btn btn-scan" onclick="startScanner()">Kamerayı Başlat / Tara</button>
    <div id="status" class="status">Barkod taramaya hazır...</div>

    <!-- Kitap Bilgi Formu (Otomatik Dolacak) -->
    <div id="resultCard" class="result-card">
        <div class="result-details">
            <img id="bookImg" src="" alt="Kapak">
            <input type="text" id="bookTitle" placeholder="Kitap Adı">
            <input type="text" id="bookAuthor" placeholder="Yazar">
            <input type="text" id="bookIsbn" placeholder="ISBN">
            <input type="text" id="bookShelf" placeholder="Raf Konumu (Örn: A1A)">
            <input type="number" id="bookPrice" placeholder="Fiyat (₺)">
            <button class="btn" onclick="saveToSupabase()">Envantere Kaydet</button>
        </div>
    </div>
</div>

<script>
    // --- yapılandırma ---
    const SUPABASE_URL = 'https://ubvlckmxzkniwhetbicx.supabase.co'; // Senin Project URL
    const SUPABASE_KEY = 'YOUR_ANON_KEY'; eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVidmxja214emtuaXdoZXRiaWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDEzNjAsImV4cCI6MjA4NzI3NzM2MH0.e2XXUPmnLOywrKwmYc0eAhl5BHZk84MdFFbKbLhfnFI
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let html5QrCode;

    // 1. Raf Atama Mantığı (Senin istediğin A1A kuralı)
    function generateShelfLocation(title) {
        if (!title) return "A1A";
        const firstChar = title.charAt(0).toUpperCase();
        return `${firstChar}1A`; // Varsayılan olarak A1A, B1A vb. üretir
    }

    // 2. Google Books API ile Bilgi Çekme
    async function getBookInfo(isbn) {
        document.getElementById('status').innerText = "Kitap bilgileri aranıyor...";
        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await response.json();
            
            if (data.items && data.items.length > 0) {
                const info = data.items[0].volumeInfo;
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('bookTitle').value = info.title;
                document.getElementById('bookAuthor').value = info.authors ? info.authors[0] : 'Bilinmiyor';
                document.getElementById('bookIsbn').value = isbn;
                document.getElementById('bookImg').src = info.imageLinks ? info.imageLinks.thumbnail : '';
                document.getElementById('bookShelf').value = generateShelfLocation(info.title);
                document.getElementById('status').innerText = "Kitap bulundu!";
            } else {
                alert("Kitap bulunamadı, lütfen manuel girin.");
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('bookIsbn').value = isbn;
            }
        } catch (error) {
            console.error("API Hatası:", error);
        }
    }

    // 3. Barkod Tarayıcıyı Başlat
    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                document.getElementById('status').innerText = "Barkod Okundu: " + decodedText;
                html5QrCode.stop(); // Okuyunca durdur
                getBookInfo(decodedText);
            }
        ).catch(err => alert("Kamera başlatılamadı: " + err));
    }

    // 4. Supabase'e Kayıt
    async function saveToSupabase() {
        const title = document.getElementById('bookTitle').value;
        const author = document.getElementById('bookAuthor').value;
        const isbn = document.getElementById('bookIsbn').value;
        const shelf = document.getElementById('bookShelf').value;
        const price = document.getElementById('bookPrice').value;

        const { data, error } = await supabase
            .from('books')
            .upsert([{ 
                title, 
                author, 
                isbn, 
                shelf_location: shelf, 
                price: parseFloat(price) || 0,
                stock_count: 1 
            }]);

        if (error) {
            alert("Hata: " + error.message);
        } else {
            alert("Kitap başarıyla envantere eklendi!");
            location.reload(); // Sayfayı sıfırla
        }
    }
</script>

</body>
</html>
